name: Update profile stats

on:
  schedule:
    - cron: "0 4 * * *"   # daily, 04:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "dark_mode.svg"
      - "light_mode.svg"
      - "cache/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Cold-cache LOC walk paginates every repo's full commit history; warm runs
    # take seconds. Bound it so a pathological run can't idle for the 6h default.
    timeout-minutes: 90
    concurrency:
      group: update-stats
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate SVGs
        id: gen
        continue-on-error: true
        run: |
          set -o pipefail
          python today.py 2>&1 | tee /tmp/today.log
        env:
          # Fine-grained PAT, all repositories:
          #   Account:    read:Followers, read:Starring
          #   Repository: read:Contents, read:Metadata
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}

      # TEMPORARY: Action logs need auth to read, so publish the failure into the
      # repo where it can be fetched anonymously. Delete once the token works.
      - name: Publish failure log
        if: steps.gen.outcome == 'failure'
        run: |
          mkdir -p .github/debug
          # Secret masking covers logs, not files we commit -- redact anyway.
          tail -40 /tmp/today.log \
            | sed -E 's/(gh[pousr]_[A-Za-z0-9_]+|github_pat_[A-Za-z0-9_]+)/***REDACTED***/g' \
            > .github/debug/last-error.log
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # today.py saves partial LOC progress before raising; keep it so the
          # next run resumes instead of re-walking every commit from scratch.
          git add -f .github/debug/last-error.log cache
          git commit -m "debug: capture today.py failure, keep partial cache"
          git push

      - name: Fail the job if generation failed
        if: steps.gen.outcome == 'failure'
        run: |
          echo "today.py failed -- see .github/debug/last-error.log"
          exit 1

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg cache
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update profile stats"
            git push
          fi
