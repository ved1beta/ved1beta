<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="540" fill="#0d0d0d"/>
  <text x="40" y="50" font-family="JetBrains Mono, monospace" font-size="13" fill="#6a6a66" letter-spacing="1">ENGRAM · INSIDE THE MODULE</text>

  <!-- Top row: transformer block context -->
  <g font-family="Inter, sans-serif" font-size="14" fill="#e8e8e3">
    <rect x="60" y="90" width="180" height="64" fill="none" stroke="#1f1f1f"/>
    <text x="150" y="120" text-anchor="middle">ENGRAM</text>
    <text x="150" y="140" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a3e635">fires first</text>

    <rect x="280" y="90" width="180" height="64" fill="none" stroke="#1f1f1f"/>
    <text x="370" y="120" text-anchor="middle">attention</text>
    <text x="370" y="140" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#6a6a66">global</text>

    <rect x="500" y="90" width="180" height="64" fill="none" stroke="#1f1f1f"/>
    <text x="590" y="120" text-anchor="middle">MoE FFN</text>
    <text x="590" y="140" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#6a6a66">compute</text>
  </g>
  <line x1="240" y1="122" x2="280" y2="122" stroke="#1f1f1f"/>
  <polygon points="280,118 290,122 280,126" fill="#a3e635"/>
  <line x1="460" y1="122" x2="500" y2="122" stroke="#1f1f1f"/>
  <polygon points="500,118 510,122 500,126" fill="#a3e635"/>

  <text x="60" y="190" font-family="JetBrains Mono, monospace" font-size="11" fill="#6a6a66" letter-spacing="0.5">↓ zoom into the engram block</text>

  <!-- Middle row: data flow inside engram -->
  <g font-family="Inter, sans-serif" font-size="13" fill="#e8e8e3">
    <!-- 1: token ids -->
    <rect x="60" y="230" width="180" height="80" fill="none" stroke="#1f1f1f"/>
    <text x="150" y="258" text-anchor="middle">token ids</text>
    <text x="150" y="278" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#6a6a66">+ compress to</text>
    <text x="150" y="294" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a3e635">canonical IDs (-23%)</text>

    <!-- 2: hash + lookup -->
    <rect x="280" y="230" width="220" height="80" fill="none" stroke="#1f1f1f"/>
    <text x="390" y="258" text-anchor="middle">multi-head hash</text>
    <text x="390" y="278" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#6a6a66">n=2,3 · K heads</text>
    <text x="390" y="294" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a3e635">prime moduli</text>

    <!-- 3: lookup table -->
    <rect x="540" y="230" width="200" height="80" fill="none" stroke="#1f1f1f"/>
    <text x="640" y="258" text-anchor="middle">embedding table</text>
    <text x="640" y="278" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#6a6a66">E[ z ]</text>
    <text x="640" y="294" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a3e635">sharded across GPUs</text>

    <!-- 4: concat + project -->
    <rect x="780" y="230" width="180" height="80" fill="none" stroke="#1f1f1f"/>
    <text x="870" y="258" text-anchor="middle">concat + W_K, W_V</text>
    <text x="870" y="278" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#6a6a66">FP8 matmul</text>
  </g>
  <line x1="240" y1="270" x2="280" y2="270" stroke="#1f1f1f"/>
  <polygon points="280,266 290,270 280,274" fill="#a3e635"/>
  <line x1="500" y1="270" x2="540" y2="270" stroke="#1f1f1f"/>
  <polygon points="540,266 550,270 540,274" fill="#a3e635"/>
  <line x1="740" y1="270" x2="780" y2="270" stroke="#1f1f1f"/>
  <polygon points="780,266 790,270 780,274" fill="#a3e635"/>

  <!-- Gate fusion area -->
  <g font-family="Inter, sans-serif" font-size="13" fill="#e8e8e3">
    <rect x="280" y="370" width="220" height="80" fill="none" stroke="#a3e63555"/>
    <text x="390" y="398" text-anchor="middle" fill="#a3e635">context gate · α</text>
    <text x="390" y="418" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#6a6a66">α = σ(h·k / √d)</text>
    <text x="390" y="434" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a3e635">aligns retrieved memory</text>

    <rect x="540" y="370" width="200" height="80" fill="none" stroke="#1f1f1f"/>
    <text x="640" y="398" text-anchor="middle">causal conv · k=4</text>
    <text x="640" y="418" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#6a6a66">depthwise dilated</text>
    <text x="640" y="434" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a3e635">zero-init · safe insert</text>

    <rect x="780" y="370" width="180" height="80" fill="none" stroke="#1f1f1f"/>
    <text x="870" y="398" text-anchor="middle">+ residual add</text>
    <text x="870" y="418" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#6a6a66">→ next sub-layer</text>
  </g>

  <!-- arrows down + flow -->
  <line x1="870" y1="310" x2="870" y2="345" stroke="#1f1f1f"/>
  <line x1="870" y1="345" x2="390" y2="345" stroke="#1f1f1f"/>
  <line x1="390" y1="345" x2="390" y2="370" stroke="#1f1f1f"/>
  <polygon points="386,370 394,370 390,378" fill="#a3e635"/>

  <line x1="500" y1="410" x2="540" y2="410" stroke="#1f1f1f"/>
  <polygon points="540,406 550,410 540,414" fill="#a3e635"/>
  <line x1="740" y1="410" x2="780" y2="410" stroke="#1f1f1f"/>
  <polygon points="780,406 790,410 780,414" fill="#a3e635"/>

  <!-- hidden state h annotation -->
  <text x="60" y="412" font-family="JetBrains Mono, monospace" font-size="11" fill="#6a6a66">hidden h →</text>
  <line x1="160" y1="408" x2="280" y2="408" stroke="#1f1f1f" stroke-dasharray="2 3"/>
</svg>
