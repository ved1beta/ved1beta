        <text y="182">}</text>
      </g>
    </g>

    
    <line x1="600" y1="90" x2="600" y2="460" stroke="#1f1f1f"></line>

    
    <g transform="translate(640, 100)">
      <text font-family="JetBrains Mono, monospace" font-size="11" fill="#a3e635" letter-spacing="1">AFTER · WRAPPED · FSDP SKIPS DESCENT</text>
      <g transform="translate(0, 28)" font-family="JetBrains Mono, monospace" font-size="13" fill="#b8b8b3">
