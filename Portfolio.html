<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ved1beta — portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0a0a;
    --surface: #121212;
    --border: #1f1f1f;
    --fg: #e8e8e3;
    --fg-dim: #b8b8b3;
    --muted: #6a6a66;
    --accent: #a3e635;
    --sans: "Inter", ui-sans-serif, system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
    --serif: "Instrument Serif", Georgia, serif;
  }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--fg); font-family:var(--sans); height:100%; }
  #root { height: 100vh; }
  * { box-sizing: border-box; }
  a { color: inherit; }
  ::selection { background: color-mix(in oklab, var(--accent) 35%, transparent); color: var(--fg); }
  @keyframes fadein { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: none; } }
  .pr-row:hover { background: color-mix(in oklab, var(--accent) 8%, transparent) !important; color: var(--fg) !important; }
  .project-card:hover { background: color-mix(in oklab, var(--accent) 5%, transparent); border-color: color-mix(in oklab, var(--accent) 35%, var(--border)) !important; }
  .readme-card:hover { background: color-mix(in oklab, var(--accent) 6%, transparent); border-color: color-mix(in oklab, var(--accent) 35%, var(--border)) !important; }
  em { font-style: italic; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="variation-ide.jsx"></script>

<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(<VariationIDE />);
</script>
</body>
</html>
